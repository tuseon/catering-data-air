<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Data Catering Air</title>
  <style>
    body { font-family: Arial; padding: 20px; max-width: 600px; margin: auto; }
    input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    td, th { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f0f0f0; }
  </style>
</head>
<body>
  <h2>Data Catering Air</h2>
  <input id="nama" placeholder="Nama">
  <input id="galon" placeholder="Jumlah Galon" type="number">
  <button onclick="tambah()">Tambah Data</button>
  
  <table id="tabel">
    <tr><th>Nama</th><th>Galon</th><th>Aksi</th></tr>
  </table>

  <script>
    let data = [];
    
    function tambah() {
      let nama = document.getElementById('nama').value;
      let galon = document.getElementById('galon').value;
      if (!nama || !galon) return alert('Isi semua bro!');
      
      data.push({nama, galon});
      document.getElementById('nama').value = '';
      document.getElementById('galon').value = '';
      render();
    }
    
    function hapus(i) {
      data.splice(i, 1);
      render();
    }
    
    function render() {
      let tabel = document.getElementById('tabel');
      tabel.innerHTML = '<tr><th>Nama</th><th>Galon</th><th>Aksi</th></tr>';
      data.forEach((d, i) => {
        tabel.innerHTML += `<tr>
          <td>${d.nama}</td>
          <td>${d.galon}</td>
          <td><button onclick="hapus(${i})">Hapus</button></td>
        </tr>`;
      });
    }
  </script>
</body>
</html>
